<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sticky Notes App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #4CAF50;
            color: white;
            padding: 20px 0;
            text-align: center;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            background-color: #333;
        }

        nav a {
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            display: inline-block;
        }

        nav a:hover {
            background-color: #555;
            border-radius: 4px;
        }

        main {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
            background-color: white;
            border-radius: 6px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        footer {
            text-align: center;
            padding: 15px 0;
            background-color: #333;
            color: white;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<header>
    <h1>Sticky Notes App</h1>
</header>

<nav>
    <a href="{% url 'note_list' %}">Home</a>
<a href="{% url 'note_list' %}">Notes</a>
<a href="{% url 'note_create' %}">Create Note</a>

</nav>

<main>
    {% block content %}
    {% endblock %}
</main>

<footer>
    &copy; 2025 Sticky Notes App
</footer>

</body>
</html>
